<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Police Intelligence Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fa-solid fa-building-shield"></i>
            <h2>Officer Login</h2>
            <p>Intelligence Command Authorization</p>
        </div>

        <div id="alert-box" class="alert alert-error" style="margin-bottom: 1.5rem; padding: 0.75rem; border-radius: 8px; font-size: 0.85rem; display: none; text-align: center; background: rgba(239, 68, 68, 0.1); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.2);"></div>

        <form id="login-form">
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="login-email" style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Police Email</label>
                <input type="email" id="login-email" class="form-control" placeholder="officer@dept.gov" required style="background: var(--bg-obsidian); border: 1px solid var(--border-color); color: white; width: 100%; padding: 0.75rem; border-radius: 8px;">
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="login-password" style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Access Password</label>
                <input type="password" id="login-password" class="form-control" placeholder="••••••••" required style="background: var(--bg-obsidian); border: 1px solid var(--border-color); color: white; width: 100%; padding: 0.75rem; border-radius: 8px;">
            </div>

            <button type="submit" id="btn-login" class="btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">
                <i class="fa-solid fa-right-to-bracket"></i> Authenticate Access
            </button>
        </form>

        <div class="auth-footer" style="margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
            New Officer? <a href="register.html" style="color: var(--accent-cyan); text-decoration: none; font-weight: 700;">Register Account</a>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
